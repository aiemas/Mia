<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Test Player</title>

<style>
body{
    font-family: Arial, sans-serif;
    text-align:center;
    background:#111;
    color:white;
    padding-top:100px;
}

button{
    padding:15px 30px;
    font-size:20px;
    border:none;
    border-radius:8px;
    background:#e50914;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#b20710;
}

/* overlay player */
#playerBox{
    display:none;
    position:fixed;
    bottom:20px;
    right:20px;
    width:420px;
    height:240px;
    background:black;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 0 20px rgba(0,0,0,0.7);
}

#playerBox iframe{
    width:100%;
    height:100%;
    border:none;
}

#closeBtn{
    position:absolute;
    top:5px;
    right:8px;
    background:red;
    border:none;
    color:white;
    font-size:14px;
    cursor:pointer;
    padding:3px 8px;
    border-radius:5px;
}
</style>
</head>

<body>

<h1>Pagina Test Stream</h1>

<button onclick="openPlayer()">Guarda Canale</button>

<div id="playerBox">
    <button id="closeBtn" onclick="closePlayer()">X</button>
    <iframe src="" id="playerFrame" allowfullscreen></iframe>
</div>

<script>
function openPlayer(){
    document.getElementById("playerBox").style.display="block";
    document.getElementById("playerFrame").src="https://dlstreams.top/embed/stream-468.php?";
}

function closePlayer(){
    document.getElementById("playerBox").style.display="none";
    document.getElementById("playerFrame").src="";
}
</script>

</body>
</html>
