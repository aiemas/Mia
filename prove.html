<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Test Player</title>

<style>
body{
    background:#111;
    color:white;
    text-align:center;
    font-family:Arial;
    padding-top:100px;
}

button{
    padding:15px 30px;
    font-size:20px;
    background:#e50914;
    color:white;
    border:none;
    border-radius:8px;
}

#playerBox{
    display:none;
    position:fixed;
    bottom:20px;
    right:20px;
    width:420px;
    height:240px;
    background:black;
    border-radius:10px;
    overflow:hidden;
}

#playerBox iframe{
    width:100%;
    height:100%;
    border:none;
}
</style>
</head>

<body>

<button onclick="play()">Apri Stream</button>

<div id="playerBox">
<iframe id="player"
allow="autoplay; fullscreen; picture-in-picture"
allowfullscreen
referrerpolicy="no-referrer">
</iframe>
</div>

<script>

function play(){
document.getElementById("playerBox").style.display="block";
document.getElementById("player").src="https://dlstreams.top/embed/stream-468.php?";
}

</script>

</body>
</html>
