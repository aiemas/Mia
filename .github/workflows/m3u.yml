name: Aggiorna lista Pepper

on:
  schedule:
    - cron: "0 11 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: Installa librerie
        run: pip install requests

      - name: Esegui script
        run: python pepper_m3u.py

      - name: Commit lista
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add cazzimiei.m3u
          git commit -m "update m3u" || echo "no changes"
          git push
